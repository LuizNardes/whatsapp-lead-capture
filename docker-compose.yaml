version: '3.3'

services:
  postgres:
    container_name: postgres
    image: postgres:15
    networks:
      - evolution-net
    command: ["postgres", "-c", "max_connections=1000"]
    restart: always
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=evolution2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - 5432

  pgadmin:
    image: dpage/pgadmin4:latest
    networks:
      - evolution-net
    environment:
      - PGADMIN_DEFAULT_EMAIL=your@email.com
      - PGADMIN_DEFAULT_PASSWORD=your-password
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - 4000:80
    links:
      - postgres

  redis:
    container_name: redis
    image: redis:7-alpine
    networks:
      - evolution-net
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  evolution-api:
    container_name: evolution-api
    image: atendai/evolution-api:latest
    networks:
      - evolution-net
    restart: always
    ports:
      - 8080:8080
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=your-api-key
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:your-password@postgres:5432/evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_client
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:

networks:
  evolution-net:
    name: evolution-net
    driver: bridge
